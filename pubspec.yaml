name: trading_strategy_tester_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.17.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  get_storage: ^2.0.3
  google_fonts: ^3.0.1
  fl_chart: ^0.50.6
  toast: ^0.3.0
  google_mobile_ads: ^1.2.0
  flutter_launcher_icons: ^0.9.2
  flutter_native_splash: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#3A0CA3"
  image: assets/logo.png

  android_12:
    image: assets/logo.png
    color: "#3A0CA3"
    android: true
    web: true
    fullscreen: true

flutter:
  uses-material-design: true
